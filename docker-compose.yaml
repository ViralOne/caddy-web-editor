services:
  caddy-editor:
    build: .
    restart: unless-stopped
    ports:
      - "9090:9090"
    env_file:
      - .env
    volumes:
      - ./test-Caddyfile:/etc/caddy/Caddyfile
      - caddy-backups:/backups
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy-backups:

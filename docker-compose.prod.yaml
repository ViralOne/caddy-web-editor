services:
  caddy-editor:
    image: ghcr.io/viralone/caddy-web-editor:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-backups:/backups
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Cloudflare Tunnel (start with: docker compose -f docker-compose.prod.yml --profile cloudflare up -d)
  cloudflared-caddy:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      caddy-editor:
        condition: service_healthy
    profiles:
      - cloudflare

volumes:
  caddy-backups:

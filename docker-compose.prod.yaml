services:
  caddy:
    image: caddy:2.11.3-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
      # Shared log dir so the editor's Logs panel can tail Caddy's access log
      - caddy-logs:/var/log/caddy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy-editor:
    image: ghcr.io/viralone/caddy-web-editor:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Reach the caddy container's admin API for Save & Reload (overrides .env)
      - CADDY_API_URL=http://caddy:2019
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-backups:/backups
      - caddy-logs:/var/log/caddy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared-caddy:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      caddy-editor:
        condition: service_healthy

volumes:
  caddy-data:
  caddy-config:
  caddy-backups:
  caddy-logs:

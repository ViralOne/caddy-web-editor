<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caddy Editor</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="header">
  <h1>Caddy Editor</h1>
  <button class="btn btn-validate" onclick="doValidate()">Validate</button>
  <button class="btn btn-save" onclick="doSave()">Save & Reload</button>
  <div class="btn-group">
    <button class="btn btn-secondary" id="panel-btn-snippets" onclick="togglePanel('snippets')">Snippets</button>
    <button class="btn btn-secondary" id="panel-btn-backups" onclick="togglePanel('backups')">Backups</button>
    <button class="btn btn-secondary" id="panel-btn-audit" onclick="togglePanel('audit')">Audit</button>
    <button class="btn btn-secondary" id="panel-btn-status" onclick="togglePanel('status')">Status</button>
  </div>
  <span class="spacer"></span>
  <span class="user-info" id="user-info"></span>
  <a href="/logout"><button class="btn btn-logout">logout</button></a>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('editor')">Editor</div>
  <div class="tab" onclick="switchTab('metrics')">Metrics</div>
</div>

<div class="warnings" id="warnings"></div>

<div class="main">
  <div class="tab-content active" id="tab-editor">
    <div class="search-bar" id="search-bar">
      <input type="text" id="search-input" placeholder="Find... (Esc to close)" oninput="doSearch()">
      <span style="color:#666;font-size:11px" id="match-count"></span>
      <button class="btn btn-secondary" onclick="searchNext()" style="padding:3px 8px;font-size:10px">Next</button>
    </div>
    <div class="editor-wrap" id="cm-editor" style="flex:1"></div>
  </div>

  <div class="tab-content" id="tab-metrics">
    <div style="padding:16px;overflow-y:auto;flex:1" id="metrics-body">
      <div id="metrics-loading">Loading metrics...</div>
    </div>
  </div>
</div>

<div class="footer">
  <span class="status-dot green" id="status-dot"></span>
  <span class="status-msg" id="status-msg">Loading...</span>
  <span class="spacer"></span>
  <span class="last-saved" id="last-saved"></span>
  <span id="cursor-pos" style="color:#555">Ln 1, Col 1</span>
</div>

<!-- Snippets Panel -->
<div class="panel" id="panel-snippets">
  <div class="panel-header"><h3>Snippets & Templates</h3><button class="panel-close" onclick="closePanel('snippets')">&times;</button></div>
  <div class="panel-body" id="snippets-list"></div>
</div>

<!-- Backups Panel -->
<div class="panel" id="panel-backups">
  <div class="panel-header"><h3>Backups</h3><button class="panel-close" onclick="closePanel('backups')">&times;</button></div>
  <div class="panel-body">
    <div id="backups-list"></div>
    <div id="backup-preview" style="display:none">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <button class="btn btn-secondary" onclick="closePreview()" style="padding:4px 10px">&larr; Back</button>
        <span id="preview-name" style="font-size:12px;color:#4fc3f7;font-weight:600"></span>
      </div>
      <div style="display:flex;gap:4px;margin-bottom:10px">
        <button class="btn btn-tab" id="tab-btn-preview" onclick="showPreviewTab('preview')">Preview</button>
        <button class="btn btn-tab active" id="tab-btn-diff" onclick="showPreviewTab('diff')">Diff</button>
      </div>
      <div id="preview-content" style="background:#0d1117;border-radius:6px;padding:10px;font-family:monospace;font-size:11px;line-height:1.5;max-height:calc(100vh - 220px);overflow:auto;white-space:pre-wrap;color:#c9d1d9"></div>
      <div id="diff-content" style="display:none;background:#0d1117;border-radius:6px;padding:10px;font-family:monospace;font-size:11px;line-height:1.5;max-height:calc(100vh - 220px);overflow:auto;white-space:pre-wrap"></div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn btn-save" onclick="restoreFromPreview()">Restore to Editor</button>
        <button class="btn btn-secondary" onclick="closePreview()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Audit Panel -->
<div class="panel" id="panel-audit">
  <div class="panel-header"><h3>Audit Log</h3><button class="panel-close" onclick="closePanel('audit')">&times;</button></div>
  <div class="panel-body" id="audit-list"></div>
</div>

<!-- Status Panel -->
<div class="panel" id="panel-status">
  <div class="panel-header"><h3>Caddy Status</h3><button class="panel-close" onclick="closePanel('status')">&times;</button></div>
  <div class="panel-body" id="status-body"></div>
</div>

<script src="/static/js/editor.bundle.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
